services:
  # Mock C2 Router gRPC Service for local stack bring-up
  c2-router:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.c2-router-mock
    environment:
      PORT: 50051
      TPM_ENABLED: ${TPM_ENABLED:-false}
    ports:
      - "${C2_ROUTER_PORT:-50051}:50051"
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').connect({host:'127.0.0.1',port:50051}).on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - aethercore

  # PostgreSQL 16
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aethercore}
      POSTGRES_USER: ${POSTGRES_USER:-aethercore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aethercore_dev_password}
      TPM_ENABLED: ${TPM_ENABLED:-false}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aethercore}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - aethercore

  # Redis 7
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - aethercore

  # Gateway Service
  gateway:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.gateway
    environment:
      PORT: 3000
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-aethercore}:${POSTGRES_PASSWORD:-aethercore_dev_password}@postgres:5432/${POSTGRES_DB:-aethercore}
      REDIS_URL: redis://redis:6379
      AUTH_SERVICE_URL: http://auth:3001
      C2_ADDR: c2-router:50051
      AETHER_BUNKER_ENDPOINT: c2-router:50051
      LATTICE_BRIDGE_STATUS_URL: http://lattice-bridge:3010/api/lattice/status
      LATTICE_BRIDGE_MODE_URL: http://lattice-bridge:3010/api/lattice/mode
      LATTICE_GATEWAY_INTERNAL_TOKEN: ${LATTICE_GATEWAY_INTERNAL_TOKEN:-aethercore_local_lattice_internal_token}
      TPM_ENABLED: ${TPM_ENABLED:-false}
    ports:
      - "${GATEWAY_PORT:-3000}:3000"
    depends_on:
      c2-router:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 20s
    networks:
      - aethercore

  # Lattice Bridge Service
  lattice-bridge:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.lattice-bridge
    environment:
      PORT: 3010
      NODE_ENV: ${NODE_ENV:-development}
      LATTICE_BASE_URL: ${LATTICE_BASE_URL:-}
      LATTICE_CLIENT_ID: ${LATTICE_CLIENT_ID:-}
      LATTICE_CLIENT_SECRET: ${LATTICE_CLIENT_SECRET:-}
      LATTICE_AGENT_ID: ${LATTICE_AGENT_ID:-aethercore-agent}
      LATTICE_INTEGRATION_MODE: ${LATTICE_INTEGRATION_MODE:-stealth_readonly}
      LATTICE_PROTOCOL_MODE: ${LATTICE_PROTOCOL_MODE:-rest}
      LATTICE_INPUT_MODE: ${LATTICE_INPUT_MODE:-synthetic}
      LATTICE_SYNTHETIC_SCENARIO: ${LATTICE_SYNTHETIC_SCENARIO:-sf_bay_maritime_incursion_v1}
      LATTICE_SYNTHETIC_SEED: ${LATTICE_SYNTHETIC_SEED:-AETHERCORE-STABLE-SEED-001}
      LATTICE_SYNTHETIC_TIMELINE: ${LATTICE_SYNTHETIC_TIMELINE:-dual}
      LATTICE_SYNTHETIC_REPLAY_HOURS: ${LATTICE_SYNTHETIC_REPLAY_HOURS:-24}
      LATTICE_SANDBOX_MODE: ${LATTICE_SANDBOX_MODE:-true}
      SANDBOXES_TOKEN: ${SANDBOXES_TOKEN:-}
      LATTICE_GRPC_TARGET: ${LATTICE_GRPC_TARGET:-lattice-grpc:443}
      LATTICE_GRPC_INSECURE: ${LATTICE_GRPC_INSECURE:-false}
      LATTICE_GRPC_CA_CERT_PATH: ${LATTICE_GRPC_CA_CERT_PATH:-}
      LATTICE_GRPC_CLIENT_CERT_PATH: ${LATTICE_GRPC_CLIENT_CERT_PATH:-}
      LATTICE_GRPC_CLIENT_KEY_PATH: ${LATTICE_GRPC_CLIENT_KEY_PATH:-}
      LATTICE_GRPC_SERVER_NAME_OVERRIDE: ${LATTICE_GRPC_SERVER_NAME_OVERRIDE:-}
      LATTICE_GRPC_POLL_WINDOW_MS: ${LATTICE_GRPC_POLL_WINDOW_MS:-1500}
      LATTICE_GRPC_MAX_EVENTS: ${LATTICE_GRPC_MAX_EVENTS:-256}
      LATTICE_GATEWAY_INTERNAL_URL: http://gateway:3000/internal/lattice/events
      LATTICE_GATEWAY_INTERNAL_TOKEN: ${LATTICE_GATEWAY_INTERNAL_TOKEN:-aethercore_local_lattice_internal_token}
      LATTICE_POLL_INTERVAL_MS: ${LATTICE_POLL_INTERVAL_MS:-15000}
      LATTICE_BRIDGE_DATA_DIR: /var/lib/lattice-bridge
      TPM_ENABLED: ${TPM_ENABLED:-false}
    ports:
      - "${LATTICE_BRIDGE_PORT:-3010}:3010"
    volumes:
      - lattice_bridge_data:/var/lib/lattice-bridge
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3010/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 20s
    networks:
      - aethercore

  # Auth Service
  auth:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.auth
    environment:
      PORT: 3001
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-aethercore}:${POSTGRES_PASSWORD:-aethercore_dev_password}@postgres:5432/${POSTGRES_DB:-aethercore}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      AETHER_BUNKER_ENDPOINT: c2-router:50051
      TPM_ENABLED: ${TPM_ENABLED:-false}
    ports:
      - "${AUTH_PORT:-3001}:3001"
    depends_on:
      c2-router:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3001/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 20s
    networks:
      - aethercore

  # Collaboration Service (Mission Guardian)
  collaboration:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.collaboration
    environment:
      PORT: 8080
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-aethercore}:${POSTGRES_PASSWORD:-aethercore_dev_password}@postgres:5432/${POSTGRES_DB:-aethercore}
      REDIS_URL: redis://redis:6379
      AUTH_SERVICE_URL: http://auth:3001
      IDENTITY_REGISTRY_ADDRESS: c2-router:50051
      TPM_ENABLED: ${TPM_ENABLED:-false}
    ports:
      - "${COLLABORATION_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:8080/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 20s
    networks:
      - aethercore

networks:
  aethercore:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  lattice_bridge_data:
    driver: local
